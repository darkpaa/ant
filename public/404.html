<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ANT Danışmanlık</title>
    <script>
      // SPA fallback for GitHub Pages and similar static hosts
      // Redirects 404s back to index.html with the original path
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/' + '?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
